<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumen de Noticias IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Lora:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #020617;
            --bg-surface: #0f172a;
            --bg-surface-hover: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #38bdf8;
            --accent-gradient: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            --border-color: rgba(255, 255, 255, 0.08);
            
            --brand-ole: #4ade80;
            --brand-ambito: #f97316;
            --brand-caras: #ec4899;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            margin: 0; padding: 0;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        header {
            background: rgba(2, 6, 23, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; z-index: 1000;
            padding: 1.25rem 0;
        }

        .header-content {
            max-width: 1400px; margin: 0 auto; padding: 0 2rem;
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo-container { display: flex; align-items: center; gap: 12px; }
        .logo-dot { width: 12px; height: 12px; background: var(--accent-gradient); border-radius: 50%; box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }
        h1 { margin: 0; font-size: 1.25rem; font-weight: 700; color: white; letter-spacing: -0.5px; }

        .filters { display: flex; gap: 1rem; }
        .filter-wrapper { position: relative; min-width: 160px; }
        select {
            appearance: none;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 0.5rem 2.5rem 0.5rem 1rem;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }
        select:hover { border-color: var(--accent); background: rgba(255, 255, 255, 0.05); }
        select option {
            background-color: #0f172a; 
            color: white;
        }

        .filter-wrapper::after {
            content: '↓'; font-size: 0.8rem; color: var(--text-muted);
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%); pointer-events: none;
        }

        main { max-width: 1400px; margin: 3rem auto; padding: 0 2rem; }
        .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted); margin-bottom: 2.5rem; font-weight: 700; display: flex; align-items: center; gap: 1rem; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border-color); }

        #news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 2.5rem; }

        .card {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.2) 100%);
            border: 1px solid var(--border-color);
            border-radius: 24px; padding: 2.5rem; display: flex; flex-direction: column;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative; overflow: hidden;
            animation: fadeIn 0.6s ease-out forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card:hover { 
            transform: translateY(-8px); 
            background: var(--bg-surface-hover); 
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7); 
            border-color: rgba(56, 189, 248, 0.3); 
        }

        .card-header { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem; }
        .badges-row { display: flex; justify-content: space-between; align-items: center; }
        .badge-group { display: flex; gap: 8px; }
        .badge { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 10px; border-radius: 6px; }
        .badge.category { background: rgba(56, 189, 248, 0.1); color: var(--accent); border: 1px solid rgba(56, 189, 248, 0.2); }

        .card.ole .badge { color: var(--brand-ole); background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.2); }
        .card.ambito .badge { color: var(--brand-ambito); background: rgba(249, 115, 22, 0.1); border: 1px solid rgba(249, 115, 22, 0.2); }
        .card.caras .badge { color: var(--brand-caras); background: rgba(236, 72, 153, 0.1); border: 1px solid rgba(236, 72, 153, 0.2); }

        .time-ago { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; }
        .card h2 { font-family: 'Lora', serif; font-size: 1.6rem; font-weight: 500; color: white; margin: 0 0 1.5rem 0; line-height: 1.3; }

        .ai-summary { background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem; position: relative; }
        .ai-summary::before { content: '✨ RESUMEN INTELIGENTE'; display: block; font-size: 0.6rem; font-weight: 800; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 0.75rem; opacity: 0.8; }
        .ai-summary p { margin: 0; font-size: 0.95rem; color: #e2e8f0; line-height: 1.7; font-weight: 400; }

        .date-details { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color); }
        .date-row { display: flex; justify-content: space-between; font-size: 0.75rem; }
        .date-label { color: var(--text-muted); font-weight: 500; font-size: 0.75rem; }
        .date-value { color: var(--text-secondary); font-family: 'Plus Jakarta Sans', sans-serif; }

        .read-more { margin-top: auto; display: inline-flex; align-items: center; gap: 8px; color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; font-weight: 700; transition: all 0.3s; }
        .read-more::after { content: '→'; font-size: 1.1rem; transition: transform 0.3s; }
        .card:hover .read-more { color: var(--accent); }
        .read-more:hover { text-decoration: underline; text-underline-offset: 4px; }
        .card:hover .read-more::after { transform: translateX(6px); }

        .loading-state { text-align: center; padding: 5rem 0; color: var(--text-secondary); }
        .spinner { width: 32px; height: 32px; border: 2px solid rgba(56, 189, 248, 0.1); border-radius: 50%; border-top-color: var(--accent); animation: spin 0.8s infinite linear; margin: 0 auto 1.5rem auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) { 
            main { padding: 0 1.25rem; margin: 2rem auto; }
            #news-grid { grid-template-columns: 1fr; gap: 1.5rem; }
            .card { padding: 1.75rem; }
            .header-content { padding: 0 1.25rem; }
            h1 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="logo-container">
                <div class="logo-dot"></div>
                <h1>Resumen Noticias IA</h1>
            </div>
            
            <div class="filters">
                <div class="filter-wrapper">
                    <select id="filter-categoria" onchange="filtrarNoticias()">
                        <option value="todos">Todas las categorías</option>
                        <option value="Política">Política</option>
                        <option value="Economía">Economía</option>
                        <option value="Deportes">Deportes</option>
                        <option value="Espectáculos">Espectáculos</option>
                        <option value="Tecnología">Tecnología</option>
                        <option value="Sociedad">Sociedad</option>
                    </select>
                </div>
                <div class="filter-wrapper">
                    <select id="filter-diario" onchange="filtrarNoticias()">
                        <option value="todos">Todos los medios</option>
                        <option value="Olé">Olé</option>
                        <option value="Ambito">Ámbito</option>
                        <option value="Caras">Caras</option>
                    </select>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="section-title">Últimas actualizaciones</div>
        
        <div id="loading" class="loading-state">
            <div class="spinner"></div>
            <div>Sincronizando noticias con la IA...</div>
        </div>
        
        <div id="news-grid"></div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAK6O1_qF6KFJn53OjJjKzV72Dk39p038E",
            authDomain: "gen-lang-client-0099709380.firebaseapp.com",
            projectId: "gen-lang-client-0099709380",
            storageBucket: "gen-lang-client-0099709380.firebasestorage.app",
            messagingSenderId: "487023114203",
            appId: "1:487023114203:web:e02ca09a98fbcec33359fe",
            measurementId: "G-S8EL8C9WWV"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let todasLasNoticias = [];

        function parseDate(val) {
            if (!val) return null;
            return val.toDate ? val.toDate() : new Date(val);
        }

        function formatFechaExacta(dateObj) {
            if (!dateObj) return "N/A";
            return dateObj.toLocaleString('es-AR', { 
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit' 
            });
        }

        function timeAgo(dateObj) {
            if (!dateObj) return '';
            const now = new Date();
            const diffMin = Math.round((now - dateObj) / 60000);
            if (diffMin < 60) return `Hace ${diffMin} min`;
            const diffHours = Math.floor(diffMin / 60);
            if (diffHours < 24) return `Hace ${diffHours} h`;
            const diffDays = Math.floor(diffHours / 24);
            return diffDays === 1 ? `Ayer` : `Hace ${diffDays} días`;
        }

        function getDiarioClass(diario) {
            if (!diario) return '';
            const d = diario.toLowerCase();
            if (d.includes('olé')) return 'ole';
            if (d.includes('ambito')) return 'ambito';
            if (d.includes('caras')) return 'caras';
            return '';
        }

        async function cargarNoticias() {
            const loader = document.getElementById('loading');
            try {
                const snapshot = await db.collection('articulos')
                    .orderBy('Fecha_Publicacion', 'desc')
                    .limit(50)
                    .get();

                loader.style.display = 'none';
                todasLasNoticias = [];
                snapshot.forEach(doc => todasLasNoticias.push(doc.data()));
                renderizarNoticias(todasLasNoticias);

            } catch (error) {
                console.error(error);
                loader.innerHTML = "Error de conexión. Verifica Firestore.";
            }
        }

        function renderizarNoticias(lista) {
            const grid = document.getElementById('news-grid');
            grid.innerHTML = '';
            
            if (lista.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; color: var(--text-muted);">No hay noticias hoy.</div>';
                return;
            }

            lista.forEach(data => {
                const card = document.createElement('article');
                card.className = `card ${getDiarioClass(data.Diario)}`;
                const fechaPub = parseDate(data.Fecha_Publicacion);
                const fechaCarga = parseDate(data.Fecha_Carga);

                card.innerHTML = `
                    <div class="card-header">
                        <div class="badges-row">
                            <div class="badge-group">
                                <span class="badge diario">${data.Diario || 'Noticia'}</span>
                                ${data.Categoria ? `<span class="badge category">${data.Categoria}</span>` : ''}
                            </div>
                            <span class="time-ago">${timeAgo(fechaPub || fechaCarga)}</span>
                        </div>
                    </div>
                    <h2>${data.Titulo || 'Sin título'}</h2>
                    <div class="ai-summary"><p>${data.Resumen_IA || 'Procesando...'}</p></div>
                    <div class="date-details">
                        <div class="date-row"><span class="date-label">Publicación RSS</span><span class="date-value">${formatFechaExacta(fechaPub)}</span></div>
                        <div class="date-row"><span class="date-label">Procesado por IA</span><span class="date-value">${formatFechaExacta(fechaCarga)}</span></div>
                    </div>
                    <a href="${data.Link}" target="_blank" class="read-more">Leer noticia completa</a>
                `;
                grid.appendChild(card);
            });
        }

        function filtrarNoticias() {
            const diario = document.getElementById('filter-diario').value;
            const categoria = document.getElementById('filter-categoria').value;
            
            let filtradas = todasLasNoticias;
            if (diario !== 'todos') filtradas = filtradas.filter(n => n.Diario === diario);
            if (categoria !== 'todos') filtradas = filtradas.filter(n => n.Categoria === categoria);
            
            renderizarNoticias(filtradas);
        }

        cargarNoticias();
    </script>
</body>
</html>
